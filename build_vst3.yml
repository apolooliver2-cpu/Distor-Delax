name: Build VST3

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Clone JUCE
      run: git clone --depth 1 --branch 7.0.9 https://github.com/juce-framework/JUCE.git C:/JUCE

    - name: Configure CMake
      run: cmake -G "Visual Studio 17 2022" -A x64 -DJUCE_PATH="C:/JUCE" -B build

    - name: Build VST3
      run: cmake --build build --config Release --target DistorcaoDelax_VST3

    - name: Upload VST3
      uses: actions/upload-artifact@v4
      with:
        name: DistorcaoDelax-VST3
        path: build/DistorcaoDelax_artefacts/Release/VST3/
